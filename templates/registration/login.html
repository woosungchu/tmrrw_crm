{% extends 'base.html' %}

{% block title %}로그인 — tmrrwcrm{% endblock %}

{% block content %}
<section class="max-w-md mx-auto px-4 py-16">
  <h1 class="text-2xl font-bold mb-6 text-center">로그인</h1>

  <form method="post" class="space-y-4 bg-white border border-slate-200 rounded-lg p-6">
    {% csrf_token %}

    {% if form.errors %}
    <div class="rounded bg-rose-50 border border-rose-200 text-rose-700 text-sm p-3">
      아이디 또는 비밀번호가 올바르지 않습니다.
    </div>
    {% endif %}

    <div>
      <label for="id_username" class="block text-sm font-semibold mb-1">아이디</label>
      <input id="id_username" name="username" type="text" autocomplete="username" required
             class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:border-indigo-500">
    </div>

    <div>
      <label for="id_password" class="block text-sm font-semibold mb-1">비밀번호</label>
      <input id="id_password" name="password" type="password" autocomplete="current-password" required
             class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:border-indigo-500">
    </div>

    <input type="hidden" name="next" value="{{ next }}">

    <button type="submit"
            class="w-full py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded transition">
      로그인
    </button>
  </form>

  <p class="text-center text-sm text-slate-500 mt-4">
    계정 없으신가요? <a href="/signup/" class="text-indigo-600 hover:underline">14일 무료 체험</a>
  </p>
</section>
{% endblock %}
