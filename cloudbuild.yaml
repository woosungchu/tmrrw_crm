# Cloud Build pipeline — git push (main) 감지 시 자동 빌드 + GAE 배포.
#
# 단계:
# 1. Tailwind CSS 빌드 (node)
# 2. requirements 설치 + Django collectstatic (dev settings — DB/Secret 미접근)
# 3. App Engine 배포 (--quiet, version=BUILD_ID 앞 8자)
#
# 권한:
# - Cloud Build SA 에 appengine.deployer, appengine.serviceAdmin, iam.serviceAccountUser, storage.admin 필요.

steps:
  - id: tailwind-build
    name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        npm install --no-audit --no-fund
        npm run build:css

  - id: django-collectstatic
    name: 'python:3.12'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        pip install --no-cache-dir -r requirements.txt
        DJANGO_SECRET_KEY=cloudbuild-tmp-key-not-used \
        DJANGO_SETTINGS_MODULE=config.settings.dev \
        DB_NAME=cb DB_USER=cb DB_PASSWORD=cb DB_HOST=127.0.0.1 \
        python manage.py collectstatic --noinput --clear

  - id: gae-deploy
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        SHORT_ID=$(echo $BUILD_ID | head -c 8)
        gcloud app deploy --quiet --version="cb-${SHORT_ID}" --promote

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1500s'
