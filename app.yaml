runtime: python312

instance_class: F1

env_variables:
  DJANGO_SETTINGS_MODULE: "config.settings.prod"
  DB_NAME: "crm"
  DB_USER: "crm_app"
  DB_HOST: "/cloudsql/tmrrwcrm:asia-northeast3:tmrrw-crm-db"
  USE_NCP_MAIL: "1"
  EMAIL_FROM: "tmrrwcrm <noreply@tmrrwcrm.com>"

beta_settings:
  cloud_sql_instances: tmrrwcrm:asia-northeast3:tmrrw-crm-db

handlers:
- url: /static
  static_dir: staticfiles
  secure: always

- url: /.*
  script: auto
  secure: always

automatic_scaling:
  min_instances: 0
  max_instances: 2
  target_cpu_utilization: 0.65

entrypoint: gunicorn -b :$PORT config.wsgi --workers 2 --threads 4 --timeout 60
